<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PumpBros Admin Dashboard</title>
    <!-- Premium Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;700&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background Elements -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>

    <!-- Login Screen -->
    <div id="login-screen" class="screen">
        <div class="glass-panel login-box">
            <div class="logo-area">
                <i class="fa-solid fa-shield-halved"></i>
            </div>
            <h2>Admin Secure Access</h2>
            <p class="subtitle">Enter credentials to manage payouts</p>
            
            <div class="input-group">
                <i class="fa-solid fa-lock"></i>
                <input type="password" id="admin-password" placeholder="Admin Password" autocomplete="off">
            </div>
            
            <button id="login-btn" class="primary-btn">
                <span>Authenticate</span>
                <i class="fa-solid fa-arrow-right"></i>
            </button>
            <p id="login-error" class="error-msg"></p>
        </div>
    </div>

    <!-- Dashboard Screen -->
    <div id="dashboard-screen" class="screen hidden">
        <nav class="top-nav glass-panel">
            <div class="nav-brand">
                <i class="fa-solid fa-bolt"></i>
                <h1>PumpBros Control Panel</h1>
            </div>
            <div class="nav-actions">
                <button id="wipeout-btn" class="danger-btn wipeout">
                    <i class="fa-solid fa-skull"></i> Wipeout Database
                </button>
                <button id="refresh-btn" class="secondary-btn">
                    <i class="fa-solid fa-rotate-right"></i> Refresh Data
                </button>
                <button id="logout-btn" class="danger-btn">
                    <i class="fa-solid fa-right-from-bracket"></i> Logout
                </button>
            </div>
        </nav>
        
        <main class="dashboard-content">
            <!-- CPU Players Section -->
            <div class="table-container glass-panel">
                <div class="section-header">
                    <div class="header-icon cpu-icon">
                        <i class="fa-solid fa-microchip"></i>
                    </div>
                    <div>
                        <h2>Top 10 CPU Players</h2>
                        <p class="section-desc">Highest local wins against the AI</p>
                    </div>
                </div>
                
                <div class="table-responsive">
                    <table id="cpu-table">
                        <thead>
                            <tr>
                                <th>Rank</th>
                                <th>Username</th>
                                <th>Wallet Address</th>
                                <th>Wins</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Data populated via JS -->
                        </tbody>
                    </table>
                </div>
            </div>

            <!-- PvP Players Section -->
            <div class="table-container glass-panel">
                <div class="section-header">
                    <div class="header-icon pvp-icon">
                        <i class="fa-solid fa-khanda"></i>
                    </div>
                    <div>
                        <h2>Top 10 PvP Players</h2>
                        <p class="section-desc">Highest online SOL winnings</p>
                    </div>
                </div>
                
                <div class="table-responsive">
                    <table id="pvp-table">
                        <thead>
                            <tr>
                                <th>Rank</th>
                                <th>Username</th>
                                <th>Wallet Address</th>
                                <th>SOL Won</th>
                                <th>Action</th>
                            </tr>
                        </thead>
                        <tbody>
                            <!-- Data populated via JS -->
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
